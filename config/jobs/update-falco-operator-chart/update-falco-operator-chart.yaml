postsubmits:
  falcosecurity/falco-operator:
    - name: update-falco-operator-chart
      decorate: true
      skip_report: false
      agent: kubernetes
      max_concurrency: 1
      branches:
        - ^main$
      run_if_changed: "^chart/falco-operator/"
      extra_refs:
        # Check out the falcosecurity/charts repo.
        # This is the working directory because the job creates a PR there.
        - org: falcosecurity
          repo: charts
          base_ref: master
          workdir: true
      spec:
        containers:
          # See images/update-falco-operator-chart
          - image: 292999226676.dkr.ecr.eu-west-1.amazonaws.com/test-infra/update-falco-operator-chart:latest
            imagePullPolicy: Always
            command:
              - /entrypoint.sh
            args:
              - /etc/github-token/oauth
            env:
              - name: GH_PROXY
                value: https://api.github.com # fixme > Can't reach http://ghproxy at the moment
              - name: GH_ORG
                value: falcosecurity
              - name: GH_REPO
                value: charts
              - name: GH_REPO_BRANCH
                value: master
              - name: SOURCE_REPO_PATH
                value: /home/prow/go/src/github.com/falcosecurity/falco-operator
              - name: SOURCE_CHART_PATH
                value: chart/falco-operator
              - name: TARGET_CHART_PATH
                value: charts/falco-operator
            volumeMounts:
              - name: github
                mountPath: /etc/github-token
                readOnly: true
              - name: gpg-signing-key
                mountPath: /root/gpg-signing-key/
                readOnly: true
        volumes:
          - name: github
            secret:
              # Secret containing a GitHub user access token with `repo` scope for creating PRs.
              secretName: oauth-token
          - name: gpg-signing-key
            secret:
              secretName: poiana-gpg-signing-key
              defaultMode: 0400
        nodeSelector:
          Archtype: "x86"
